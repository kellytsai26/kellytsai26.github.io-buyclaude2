<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 方案採購對照表</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --secondary: #64748b;
            --accent: #e11d48;
            --border: #e2e8f0;
            --header-bg: #1e293b;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: #1e293b;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        .page-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 40px;
            color: var(--header-bg);
            letter-spacing: -0.025em;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        /* 表頭樣式 */
        thead th {
            background-color: var(--header-bg);
            color: white;
            padding: 24px 16px;
            font-weight: 600;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        thead th:last-child { border-right: none; }
